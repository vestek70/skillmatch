<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SkillMatch Web: cadastre o perfil de um candidato e compare suas habilidades com vagas de tecnologia, vendo o percentual de compatibilidade com cada uma." />
    <link rel="icon" href="data:," />
    <title>SkillMatch Web</title>
    <link rel="stylesheet" href="assets/styles/style.css" />
</head>
<body>
    <header>
        <img src="assets/img/logo.svg" alt="Logotipo SkillMatch Web: dois círculos sobrepostos com um símbolo de verificação, representando a comparação entre candidato e vaga" width="48" height="48" class="logo" />
        <h1>SkillMatch Web</h1>
        <p>Cadastre o perfil do candidato e compare com as vagas disponíveis.</p>
    </header>

    <main>
        <section aria-labelledby="titulo-formulario">
            <h2 id="titulo-formulario">Perfil do Candidato</h2>

            <form id="form-candidato" novalidate>
                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required aria-describedby="erro-nome" />
                    <span id="erro-nome" class="erro-campo" role="alert"></span>
                </div>

                <div class="campo">
                    <label for="area">Área de atuação</label>
                    <input type="text" id="area" name="area" required aria-describedby="erro-area" />
                    <span id="erro-area" class="erro-campo" role="alert"></span>
                </div>

                <div class="campo">
                    <label for="habilidades">Habilidades (separadas por vírgula)</label>
                    <input type="text" id="habilidades" name="habilidades" placeholder="JavaScript, HTML, CSS" required aria-describedby="erro-habilidades" />
                    <span id="erro-habilidades" class="erro-campo" role="alert"></span>
                </div>

                <div class="campo">
                    <label for="experiencia">Experiência (em meses)</label>
                    <input type="number" id="experiencia" name="experiencia" min="0" required aria-describedby="erro-experiencia" />
                    <span id="erro-experiencia" class="erro-campo" role="alert"></span>
                </div>

                <button type="submit">Salvar Perfil</button>

                <p id="mensagem-status" role="status" aria-live="polite"></p>
                <div id="perfil-resumo" class="perfil-resumo" aria-live="polite"></div>
            </form>
        </section>

        <section class="secao-vagas" aria-labelledby="titulo-vagas">
            <h2 id="titulo-vagas">Vagas Compatíveis</h2>
            <p id="status-vagas" role="status" aria-live="polite"></p>
            <p id="melhor-vaga" class="melhor-vaga" aria-live="polite"></p>
            <p id="recomendacao-estudo" class="recomendacao-estudo" aria-live="polite"></p>
            <div id="lista-vagas" class="vagas-lista"></div>
        </section>
    </main>

    <footer>
        <p>Desenvolvido por Konstantin Borisov &mdash; Projeto SkillMatch (SCTEC Front-End React)</p>
    </footer>

    <script type="module" src="assets/scripts/main.js"></script>
</body>
</html>
